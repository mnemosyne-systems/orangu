[orangu-server]
models = ~/models
# model = unsloth/gemma-4-E2B-it-GGUF:Q4_K_M  # only used by --daemon
host = 127.0.0.1
port = 8100
web = 8101
# backend = auto  # auto, cpu, vulkan, cuda, opencl, or rocm — auto tries
                  # every GPU backend built into this binary, in order,
                  # falling back to cpu; rocm needs `cargo build --features
                  # rocm` (see doc/SERVER_ROADMAP.md)
# role = all  # all, code, review, explorer, or embedding — only used by
              # --daemon; a normal run always takes its role from
              # --all/--code/--review/--explorer/--embedding (--all if none given)
